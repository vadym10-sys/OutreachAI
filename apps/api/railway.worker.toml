[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
	"/Dockerfile",
	"/db/**",
	"/requirements.txt",
	"/railway.worker.toml",
	"/app/jobs/**",
	"/app/api/routes.py",
	"/app/api/usage.py",
	"/app/core/**",
	"/app/models/**",
	"/app/schemas/**",
	"/app/services/**"
]

[deploy]
startCommand = "python -m app.jobs.worker"
restartPolicyType = "ON_FAILURE"
