[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
	"/Dockerfile",
	"/db/**",
	"/requirements.txt",
	"/railway.backup.toml",
	"/app/jobs/run_database_backup.py",
	"/app/core/**",
	"/app/models/**",
	"/app/services/backups.py"
]

[deploy]
startCommand = "python -m app.jobs.run_database_backup"
cronSchedule = "0 2 * * *"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
