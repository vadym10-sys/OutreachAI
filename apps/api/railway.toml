[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
	"/Dockerfile",
	"/db/**",
	"/requirements.txt",
	"/railway.toml",
	"/app/main.py",
	"/app/serve.py",
	"/app/api/webhooks.py",
	"/app/api/routes.py",
	"/app/api/usage.py",
	"/app/core/**",
	"/app/models/**",
	"/app/schemas/**",
	"/app/services/**"
]

[deploy]
startCommand = "python -m app.serve"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
