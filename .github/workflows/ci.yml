name: CI

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        run: npm --prefix apps/web ci
      - name: Lint
        run: npm --prefix apps/web run lint
      - name: Typecheck
        run: npm --prefix apps/web run typecheck
      - name: Unit tests
        run: npm --prefix apps/web test -- --run
      - name: Production build
        run: npm --prefix apps/web run build
      - name: Install Playwright browsers
        run: cd apps/web && npm exec -- playwright install --with-deps chromium firefox webkit
      - name: Playwright E2E
        run: npm --prefix apps/web run e2e
      - name: Diagnose Playwright failures
        if: always()
        run: npm --prefix apps/web run qa:diagnose
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload Playwright traces, videos and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload Playwright machine reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-machine-reports
          path: apps/web/test-artifacts
          if-no-files-found: ignore
          retention-days: 14

  api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt
      - name: API lint
        run: cd apps/api && python -m ruff check app tests
      - name: API tests
        run: PYTHONPATH=apps/api pytest apps/api/tests
